<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="900" height="1280" viewBox="0 0 900 1280" role="img" aria-labelledby="title desc">
  <title id="title">OPH two-constant unification diagram</title>
  <desc id="desc">The current OPH quantitative surface has two fixed-point closure values. The local pixel fixed point P feeds gravity, the Ward-projected electromagnetic channel, and the scoped particle-mass rows. The global record-capacity fixed point N_CRC feeds the cosmological-constant branch.</desc>

  <defs>
    <marker id="arrow-gold" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="hsl(45,90%,55%)"/>
    </marker>
    <marker id="arrow-cyan" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="hsl(185,80%,55%)"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="hsl(140,60%,55%)"/>
    </marker>
    <marker id="arrow-violet" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="hsl(280,70%,65%)"/>
    </marker>

    <linearGradient id="root-p" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="hsl(45,90%,25%)"/>
      <stop offset="100%" stop-color="hsl(35,85%,18%)"/>
    </linearGradient>
    <linearGradient id="root-n" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="hsl(280,70%,25%)"/>
      <stop offset="100%" stop-color="hsl(270,65%,18%)"/>
    </linearGradient>
    <linearGradient id="gravity" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="hsl(185,70%,15%)"/>
      <stop offset="100%" stop-color="hsl(185,60%,10%)"/>
    </linearGradient>
    <linearGradient id="particle" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="hsl(140,50%,15%)"/>
      <stop offset="100%" stop-color="hsl(140,40%,10%)"/>
    </linearGradient>
    <linearGradient id="cosmo" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="hsl(280,60%,15%)"/>
      <stop offset="100%" stop-color="hsl(280,50%,10%)"/>
    </linearGradient>

    <style>
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace; }
      .small { font-size: 10px; }
      .note { font-size: 11px; fill: hsl(220,15%,62%); }
      .label { font-size: 13px; font-weight: 700; letter-spacing: 0.02em; }
      .value { font-size: 17px; font-weight: 700; }
      .title { font-size: 18px; font-weight: 700; letter-spacing: 0.04em; }
      .dash { stroke-dasharray: 4 3; }
    </style>
  </defs>

  <rect width="900" height="1280" rx="14" fill="hsl(220,20%,7%)"/>

  <text class="mono title" x="450" y="34" text-anchor="middle" fill="hsl(45,90%,75%)">TWO CONSTANTS -&gt; GRAVITY + α + PARTICLE MASSES + Λ</text>

  <rect x="40" y="58" width="390" height="104" rx="12" fill="url(#root-p)" stroke="hsl(45,90%,55%)" stroke-width="2"/>
  <text class="mono label" x="235" y="84" text-anchor="middle" fill="hsl(45,90%,78%)">LOCAL CLOSURE · PIXEL CONSTANT</text>
  <text class="mono" x="235" y="110" text-anchor="middle" font-size="24" font-weight="700" fill="hsl(45,95%,88%)">P = 1.630968</text>
  <text class="mono small" x="235" y="130" text-anchor="middle" fill="hsl(45,62%,66%)">fixed point of P = φ + α_em(P)·√π</text>
  <text class="mono small" x="235" y="146" text-anchor="middle" fill="hsl(45,58%,60%)">one screen cell · read from both sides</text>

  <rect x="470" y="58" width="390" height="104" rx="12" fill="url(#root-n)" stroke="hsl(280,70%,65%)" stroke-width="2"/>
  <text class="mono label" x="665" y="84" text-anchor="middle" fill="hsl(280,72%,82%)">GLOBAL CLOSURE · HORIZON CAPACITY</text>
  <text class="mono" x="665" y="110" text-anchor="middle" font-size="22" font-weight="700" fill="hsl(280,80%,90%)">N_CRC = 3.31 × 10¹²²</text>
  <text class="mono small" x="665" y="130" text-anchor="middle" fill="hsl(280,56%,72%)">fixed point of N = F(N)</text>
  <text class="mono small" x="665" y="146" text-anchor="middle" fill="hsl(280,54%,68%)">one horizon · read from both sides</text>

  <rect x="40" y="180" width="820" height="28" rx="7" fill="hsl(220,20%,12%)" stroke="hsl(45,40%,40%)" stroke-width="1"/>
  <text class="mono label" x="450" y="199" text-anchor="middle" fill="hsl(45,70%,75%)">TWO CLOSURE VALUES · BOTH UNIQUE FIXED POINTS · ZERO FITTED PARAMETERS</text>

  <line x1="235" y1="162" x2="235" y2="228" stroke="hsl(45,90%,55%)" stroke-width="2" marker-end="url(#arrow-gold)"/>
  <line x1="665" y1="162" x2="665" y2="228" stroke="hsl(280,70%,65%)" stroke-width="2" marker-end="url(#arrow-violet)"/>

  <rect x="40" y="228" width="430" height="82" rx="9" fill="hsl(220,20%,12%)" stroke="hsl(45,60%,40%)" stroke-width="1.2"/>
  <text class="mono label" x="255" y="250" text-anchor="middle" fill="hsl(45,82%,70%)">P-BRANCH · COMMON DERIVATION CHAIN</text>
  <text class="mono small" x="255" y="269" text-anchor="middle" fill="hsl(220,15%,66%)">P fixes α_U, the transmutation pair (t_U, t_tr),</text>
  <text class="mono small" x="255" y="285" text-anchor="middle" fill="hsl(220,15%,66%)">the Ward-projected electromagnetic channel,</text>
  <text class="mono small" x="255" y="301" text-anchor="middle" fill="hsl(220,15%,66%)">the electroweak scale v, and the cell area a_cell.</text>

  <rect x="510" y="228" width="350" height="82" rx="9" fill="hsl(220,20%,12%)" stroke="hsl(280,55%,45%)" stroke-width="1.2"/>
  <text class="mono label" x="685" y="250" text-anchor="middle" fill="hsl(280,65%,80%)">N-BRANCH · COSMOLOGY CHAIN</text>
  <text class="mono small" x="685" y="269" text-anchor="middle" fill="hsl(280,25%,70%)">N_CRC is the active observer-readable</text>
  <text class="mono small" x="685" y="285" text-anchor="middle" fill="hsl(280,25%,70%)">horizon entropy capacity, in nats.</text>
  <text class="mono small" x="685" y="301" text-anchor="middle" font-weight="700" fill="hsl(280,60%,80%)">Λ = 3π / (G · N_CRC)</text>

  <line x1="255" y1="310" x2="255" y2="344" stroke="hsl(45,60%,42%)" stroke-width="1.5"/>
  <path d="M255,344 L180,344 L180,370" stroke="hsl(185,80%,55%)" stroke-width="2" fill="none" marker-end="url(#arrow-cyan)"/>
  <path d="M255,344 L480,344 L480,370" stroke="hsl(140,60%,55%)" stroke-width="2" fill="none" marker-end="url(#arrow-green)"/>
  <rect x="132" y="333" width="246" height="24" rx="12" fill="hsl(220,20%,12%)" stroke="hsl(45,60%,45%)" stroke-width="1"/>
  <text class="mono small" x="255" y="350" text-anchor="middle" font-weight="700" fill="hsl(45,80%,70%)">P -> α_U, t_U, t_tr, a_cell</text>

  <line x1="685" y1="310" x2="685" y2="360" stroke="hsl(280,70%,65%)" stroke-width="2" marker-end="url(#arrow-violet)"/>
  <rect x="610" y="370" width="250" height="66" rx="8" fill="url(#cosmo)" stroke="hsl(280,70%,65%)" stroke-width="2"/>
  <text class="mono small" x="735" y="391" text-anchor="middle" fill="hsl(280,40%,72%)">Cosmological constant</text>
  <text class="mono value" x="735" y="414" text-anchor="middle" fill="hsl(280,85%,90%)">Λ ≈ 1.1 × 10⁻⁵² m⁻²</text>
  <text class="mono small" x="735" y="429" text-anchor="middle" fill="hsl(280,40%,65%)">Λℓ_P² = 3π/N_CRC</text>

  <rect x="610" y="452" width="250" height="48" rx="6" fill="hsl(220,20%,10%)" stroke="hsl(280,40%,35%)" stroke-width="1"/>
  <text class="mono small" x="735" y="473" text-anchor="middle" fill="hsl(280,35%,65%)">dark-energy equation of state</text>
  <text class="mono small" x="735" y="490" text-anchor="middle" font-weight="700" fill="hsl(280,55%,78%)">w = -1 when N_CRC is locked</text>

  <rect x="610" y="522" width="250" height="82" rx="7" fill="hsl(220,20%,9%)" stroke="hsl(280,40%,35%)" stroke-width="1"/>
  <text class="mono small" x="735" y="543" text-anchor="middle" font-weight="700" fill="hsl(280,50%,72%)">Units of N_CRC</text>
  <text class="mono small" x="735" y="562" text-anchor="middle" fill="hsl(280,30%,65%)">N_patch ≈ 1.05 × 10¹²²</text>
  <text class="mono small" x="735" y="578" text-anchor="middle" fill="hsl(280,30%,65%)">N_CRC ≈ 3.31 × 10¹²² nats</text>
  <text class="mono small" x="735" y="594" text-anchor="middle" fill="hsl(280,30%,65%)">N_CRC/ln2 ≈ 4.78 × 10¹²² qubits</text>

  <rect x="40" y="370" width="280" height="42" rx="8" fill="url(#gravity)" stroke="hsl(185,80%,55%)" stroke-width="1.5"/>
  <text class="mono label" x="180" y="389" text-anchor="middle" fill="hsl(185,80%,80%)">GRAVITY BRANCH</text>
  <text class="mono small" x="180" y="405" text-anchor="middle" fill="hsl(185,50%,60%)">edge entropy -> Newton matching</text>

  <line x1="180" y1="412" x2="180" y2="438" stroke="hsl(185,80%,55%)" stroke-width="1.5" marker-end="url(#arrow-cyan)"/>
  <rect x="40" y="438" width="280" height="46" rx="6" fill="hsl(220,20%,10%)" stroke="hsl(185,40%,35%)" stroke-width="1"/>
  <text class="mono small" x="180" y="459" text-anchor="middle" font-weight="700" fill="hsl(185,60%,70%)">lbar_shared = P / 4 = 0.4077</text>
  <text class="mono small" x="180" y="475" text-anchor="middle" fill="hsl(220,15%,55%)">boundary information density</text>

  <line x1="180" y1="484" x2="180" y2="510" stroke="hsl(185,80%,55%)" stroke-width="1.5" marker-end="url(#arrow-cyan)"/>
  <rect x="40" y="510" width="280" height="46" rx="6" fill="hsl(220,20%,10%)" stroke="hsl(185,40%,35%)" stroke-width="1"/>
  <text class="mono small" x="180" y="530" text-anchor="middle" font-weight="700" fill="hsl(185,60%,70%)">G_nat = a_cell / P ≈ 0.6131</text>
  <text class="mono small" x="180" y="547" text-anchor="middle" fill="hsl(220,15%,55%)">gravitational coupling, Planck units</text>

  <line x1="180" y1="556" x2="180" y2="582" stroke="hsl(185,80%,55%)" stroke-width="1.5" marker-end="url(#arrow-cyan)"/>
  <rect x="28" y="582" width="304" height="64" rx="8" fill="hsl(185,70%,12%)" stroke="hsl(185,80%,55%)" stroke-width="2"/>
  <text class="mono small" x="180" y="604" text-anchor="middle" fill="hsl(185,50%,65%)">Newton's gravitational constant</text>
  <text class="mono" x="180" y="628" text-anchor="middle" font-size="14" font-weight="700" fill="hsl(185,95%,85%)">G = 6.6743 × 10⁻¹¹ m³kg⁻¹s⁻²</text>

  <line x1="180" y1="646" x2="180" y2="672" stroke="hsl(185,50%,40%)" stroke-width="1" class="dash"/>
  <rect x="40" y="672" width="280" height="48" rx="6" fill="hsl(220,20%,9%)" stroke="hsl(185,30%,30%)" stroke-width="0.8"/>
  <text class="mono small" x="180" y="693" text-anchor="middle" fill="hsl(185,40%,55%)">ℓ_P = 1.616 × 10⁻³⁵ m</text>
  <text class="mono small" x="180" y="710" text-anchor="middle" fill="hsl(185,40%,55%)">M_P = 1.221 × 10¹⁹ GeV</text>

  <rect x="330" y="370" width="300" height="42" rx="8" fill="url(#particle)" stroke="hsl(140,60%,55%)" stroke-width="1.5"/>
  <text class="mono label" x="480" y="389" text-anchor="middle" fill="hsl(140,70%,80%)">PARTICLE BRANCH</text>
  <text class="mono small" x="480" y="405" text-anchor="middle" fill="hsl(140,40%,55%)">gauge consistency -> mass spectrum</text>

  <line x1="480" y1="412" x2="480" y2="438" stroke="hsl(140,60%,55%)" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <rect x="330" y="438" width="300" height="46" rx="6" fill="hsl(220,20%,10%)" stroke="hsl(140,35%,35%)" stroke-width="1"/>
  <text class="mono small" x="480" y="459" text-anchor="middle" font-weight="700" fill="hsl(140,55%,65%)">Electroweak source trunk</text>
  <text class="mono small" x="480" y="475" text-anchor="middle" fill="hsl(220,15%,55%)">P -> α_U -> (t_U,t_tr) -> v = 246.767 GeV</text>

  <line x1="480" y1="484" x2="480" y2="510" stroke="hsl(220,15%,35%)" stroke-width="1.5" class="dash"/>
  <rect x="330" y="510" width="300" height="64" rx="8" fill="hsl(220,15%,10%)" stroke="hsl(220,15%,30%)" stroke-width="1" class="dash"/>
  <text class="mono small" x="480" y="531" text-anchor="middle" fill="hsl(220,15%,50%)">W and Z bosons (compare-only adapter)</text>
  <text class="mono" x="480" y="551" text-anchor="middle" font-size="13" fill="hsl(220,15%,45%)">W: 80.377 GeV</text>
  <text class="mono" x="480" y="568" text-anchor="middle" font-size="13" fill="hsl(220,15%,45%)">Z: 91.18797809 GeV</text>

  <line x1="480" y1="574" x2="480" y2="600" stroke="hsl(140,60%,55%)" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <rect x="318" y="600" width="324" height="66" rx="8" fill="hsl(140,50%,12%)" stroke="hsl(140,60%,55%)" stroke-width="2"/>
  <text class="mono small" x="480" y="622" text-anchor="middle" fill="hsl(140,40%,60%)">Fine-structure constant, Ward-projected readout</text>
  <text class="mono" x="480" y="643" text-anchor="middle" font-size="14" font-weight="700" fill="hsl(140,80%,82%)">α⁻¹(m_Z²) = 128.306</text>
  <text class="mono" x="480" y="660" text-anchor="middle" font-size="14" font-weight="700" fill="hsl(140,90%,85%)">α⁻¹(0) = 137.035999177</text>

  <line x1="480" y1="666" x2="480" y2="692" stroke="hsl(140,60%,55%)" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <rect x="318" y="692" width="324" height="50" rx="8" fill="hsl(140,50%,12%)" stroke="hsl(140,60%,55%)" stroke-width="2"/>
  <text class="mono small" x="480" y="713" text-anchor="middle" fill="hsl(140,40%,60%)">Higgs, quantitative theorem · D10/D11</text>
  <text class="mono" x="480" y="734" text-anchor="middle" font-size="14" font-weight="700" fill="hsl(140,80%,82%)">M_H = 125.1995 GeV</text>

  <line x1="480" y1="742" x2="480" y2="768" stroke="hsl(140,60%,55%)" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <rect x="318" y="768" width="324" height="66" rx="8" fill="hsl(140,50%,12%)" stroke="hsl(140,60%,55%)" stroke-width="2"/>
  <text class="mono small" x="480" y="790" text-anchor="middle" fill="hsl(140,40%,60%)">Top quark, selected-class theorem on f_P</text>
  <text class="mono" x="480" y="811" text-anchor="middle" font-size="14" font-weight="700" fill="hsl(140,80%,82%)">t = 172.352 GeV</text>
  <text class="mono small" x="480" y="827" text-anchor="middle" fill="hsl(140,40%,55%)">direct-top bridge: 172.559 GeV (0.28 sigma)</text>

  <line x1="480" y1="834" x2="480" y2="862" stroke="hsl(140,60%,55%)" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <rect x="318" y="862" width="324" height="118" rx="8" fill="hsl(140,50%,12%)" stroke="hsl(140,60%,55%)" stroke-width="2"/>
  <text class="mono small" x="480" y="884" text-anchor="middle" fill="hsl(140,40%,60%)">Quark running masses, PDG 2025 exact match</text>
  <text class="mono" x="480" y="906" text-anchor="middle" font-size="13" font-weight="700" fill="hsl(140,80%,82%)">b(m_b) = 4.183 GeV</text>
  <text class="mono" x="480" y="923" text-anchor="middle" font-size="13" font-weight="700" fill="hsl(140,80%,82%)">c(m_c) = 1.273 GeV</text>
  <text class="mono" x="480" y="940" text-anchor="middle" font-size="13" font-weight="700" fill="hsl(140,80%,82%)">s(2 GeV) = 93.5 MeV</text>
  <text class="mono" x="480" y="957" text-anchor="middle" font-size="13" font-weight="700" fill="hsl(140,80%,82%)">d(2 GeV) = 4.70 MeV</text>
  <text class="mono" x="480" y="974" text-anchor="middle" font-size="13" font-weight="700" fill="hsl(140,80%,82%)">u(2 GeV) = 2.16 MeV</text>

  <line x1="480" y1="980" x2="480" y2="1006" stroke="hsl(220,15%,35%)" stroke-width="1.5" class="dash"/>
  <rect x="340" y="1006" width="280" height="78" rx="8" fill="hsl(220,15%,10%)" stroke="hsl(220,15%,30%)" stroke-width="1" class="dash"/>
  <text class="mono small" x="480" y="1027" text-anchor="middle" fill="hsl(220,15%,50%)">Charged leptons (continuation gap)</text>
  <text class="mono small" x="480" y="1047" text-anchor="middle" fill="hsl(220,15%,45%)">e = 0.000511 GeV (witness)</text>
  <text class="mono small" x="480" y="1064" text-anchor="middle" fill="hsl(220,15%,45%)">μ = 0.10566 GeV (witness)</text>
  <text class="mono small" x="480" y="1081" text-anchor="middle" fill="hsl(220,15%,45%)">τ = 1.77693 GeV (witness)</text>

  <rect x="150" y="1110" width="600" height="84" rx="8" fill="hsl(220,20%,10%)" stroke="hsl(260,40%,45%)" stroke-width="1.5"/>
  <text class="mono label" x="450" y="1133" text-anchor="middle" fill="hsl(260,50%,80%)">STRUCTURAL INVARIANTS</text>
  <text class="mono small" x="450" y="1152" text-anchor="middle" fill="hsl(260,30%,60%)">from Lorentz symmetry of the observer sphere</text>
  <text class="mono" x="450" y="1174" text-anchor="middle" font-size="14" font-weight="700" fill="hsl(260,40%,85%)">c = 299,792,458 m/s · photon, gluon, graviton mass = 0</text>

  <rect x="40" y="1214" width="820" height="26" rx="7" fill="hsl(45,80%,12%)" stroke="hsl(45,70%,40%)" stroke-width="1"/>
  <text class="mono small" x="450" y="1232" text-anchor="middle" font-weight="700" fill="hsl(45,90%,75%)">TWO CLOSURES (P, N_CRC) -> G + α + M_H + 6 QUARK MASSES + Λ + STRUCTURAL CONSTANTS</text>

  <rect x="120" y="1254" width="660" height="18" rx="5" fill="hsl(220,20%,10%)" stroke="hsl(220,20%,30%)" stroke-width="1"/>
  <text class="mono small" x="450" y="1267" text-anchor="middle" fill="hsl(220,15%,65%)">P: local outer/inner closure · N_CRC: outside capacity Λ_out(N) = inside record capacity F(N)</text>
</svg>
