<title id="title">Observer Patch Holography vs PDG Quark Mass Matches</title>
<desc id="desc">A social-card comparison table for the OPH selected-class quark theorem, showing exact stored OPH running quark masses against the pinned PDG 2025 API reference values, plus the scalar Yukawa couplings implied by the same exact mass surface and exact electroweak v, with OPH fixed-point context P = 1.630968 and N_CRC = 3.31e122.</desc>
