name: Claim Registry

on:
  pull_request:
    paths:
      - "claims/**"
      - "paper/**/*.tex"
      - "extra/**/*.tex"
      - "README.md"
      - "README_FR.md"
      - "tools/check_claim_registry.py"
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Require registry review on claim-surface edits
        if: github.event_name == 'pull_request'
        run: |
          set -euo pipefail
          changed="$(git diff --name-only "origin/${{ github.base_ref }}...HEAD")"
          claim_surface="$(printf '%s\n' "$changed" | grep -E '^(paper/.*\.tex|extra/.*\.tex|README\.md|README_FR\.md)$' || true)"
          registry_surface="$(printf '%s\n' "$changed" | grep -E '^(claims/|tools/check_claim_registry\.py|\.github/workflows/claim-registry\.yml)' || true)"
          if [ -n "$claim_surface" ] && [ -z "$registry_surface" ]; then
            echo "Public claim-surface files changed without touching the registry/check surface." >&2
            echo "Touched claim files:" >&2
            printf '%s\n' "$claim_surface" >&2
            echo "Update claims/ or the registry validator when claim language changes." >&2
            exit 1
          fi

      - name: Validate registry
        run: python3 tools/check_claim_registry.py
