name: Lean CI

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install elan
        run: |
          set -euo pipefail
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf \
            | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Print toolchain
        working-directory: Lean
        run: |
          lean --version
          lake --version

      - name: Cache Lake build
        uses: actions/cache@v4
        with:
          path: |
            Lean/.lake
            Lean/ObserverPatchHolography/Proofs/ObservableNormalForms/.lake
          key: lake-${{ runner.os }}-${{ hashFiles('Lean/lean-toolchain', 'Lean/lakefile.lean', 'Lean/lake-manifest.json', 'Lean/ObserverPatchHolography/Proofs/ObservableNormalForms/lean-toolchain', 'Lean/ObserverPatchHolography/Proofs/ObservableNormalForms/lakefile.lean', 'Lean/ObserverPatchHolography/Proofs/ObservableNormalForms/lake-manifest.json') }}
          restore-keys: |
            lake-${{ runner.os }}-

      - name: Resolve deps if manifest missing
        working-directory: Lean
        run: |
          if [ ! -f lake-manifest.json ]; then
            lake update
          fi

      - name: Fetch Mathlib cache
        working-directory: Lean
        run: lake exe cache get || true

      - name: Build and check zero proof debt
        working-directory: Lean
        run: |
          set -euo pipefail
          lake build 2>&1 | tee lake-build.log

          (
            cd ObserverPatchHolography/Proofs/ObservableNormalForms
            lake build
            if rg -n '^\s*(sorry|admit)\b|:=\s*(sorry|admit)\b' \
                ObservableNormalForms --glob '*.lean'; then
              echo "Unexpected admission in neutral submission artifact." >&2
              exit 1
            fi
          )

          sorry_warnings="$(grep -F 'declaration uses `sorry`' lake-build.log || true)"

          if [ -n "$sorry_warnings" ]; then
            echo "Unexpected Lean proof-debt state." >&2
            echo "Expected zero sorry warnings (the Primitives.lean admissions were discharged)." >&2
            echo "Actual sorry warnings:" >&2
            printf '%s\n' "$sorry_warnings" >&2
            exit 1
          fi
