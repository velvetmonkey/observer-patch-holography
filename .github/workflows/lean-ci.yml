name: Lean CI

on:
  push:
    paths:
      - 'LEAN/**'
      - '.github/workflows/lean-ci.yml'
  pull_request:
    paths:
      - 'LEAN/**'
      - '.github/workflows/lean-ci.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install elan
        run: |
          set -euo pipefail
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf \
            | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Print toolchain
        working-directory: LEAN
        run: |
          lean --version
          lake --version

      - name: Cache Lake build
        uses: actions/cache@v4
        with:
          path: LEAN/.lake
          key: lake-${{ runner.os }}-${{ hashFiles('LEAN/lean-toolchain', 'LEAN/lakefile.lean', 'LEAN/lake-manifest.json') }}
          restore-keys: |
            lake-${{ runner.os }}-

      - name: Resolve deps if manifest missing
        working-directory: LEAN
        run: |
          if [ ! -f lake-manifest.json ]; then
            lake update
          fi

      - name: Fetch Mathlib cache
        working-directory: LEAN
        run: lake exe cache get || true

      - name: Build
        working-directory: LEAN
        run: lake build
