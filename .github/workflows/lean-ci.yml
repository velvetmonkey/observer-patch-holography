name: Lean CI

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install elan
        run: |
          set -euo pipefail
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf \
            | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Print toolchain
        working-directory: LEAN
        run: |
          lean --version
          lake --version

      - name: Cache Lake build
        uses: actions/cache@v4
        with:
          path: LEAN/.lake
          key: lake-${{ runner.os }}-${{ hashFiles('LEAN/lean-toolchain', 'LEAN/lakefile.lean', 'LEAN/lake-manifest.json') }}
          restore-keys: |
            lake-${{ runner.os }}-

      - name: Resolve deps if manifest missing
        working-directory: LEAN
        run: |
          if [ ! -f lake-manifest.json ]; then
            lake update
          fi

      - name: Fetch Mathlib cache
        working-directory: LEAN
        run: lake exe cache get || true

      - name: Build and check proof-debt allowlist
        working-directory: LEAN
        run: |
          set -euo pipefail
          lake build 2>&1 | tee lake-build.log

          sorry_warnings="$(grep -F 'declaration uses `sorry`' lake-build.log || true)"
          if [ -n "$sorry_warnings" ]; then
            sorry_count="$(printf '%s\n' "$sorry_warnings" | grep -c .)"
          else
            sorry_count=0
          fi
          unexpected="$(printf '%s\n' "$sorry_warnings" | grep -v 'warning: ObserverPatchHolography/Primitives.lean:' || true)"

          if [ "$sorry_count" -ne 3 ] || [ -n "$unexpected" ]; then
            echo "Unexpected Lean proof-debt state." >&2
            echo "Expected exactly 3 sorry warnings, all in ObserverPatchHolography/Primitives.lean." >&2
            echo "Actual sorry warnings:" >&2
            printf '%s\n' "$sorry_warnings" >&2
            exit 1
          fi
